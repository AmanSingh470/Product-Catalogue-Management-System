<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Product Catalog</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            accent: '#e62b2b',
            'accent-dark': '#c41f1f',
            bg: '#f4f4f4',
            border: '#e0e0e0',
            muted: '#888',
            'thumb-bg': '#1a1a1a',
          }
        }
      }
    }
  </script>
  <style>
    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }
  </style>
</head>
<body class="bg-[#f4f4f4] font-['Segoe_UI',sans-serif] text-[#1a1a1a] min-h-screen">

<!-- TOP BAR -->
<header class="bg-white border-b border-[#e0e0e0] px-6 h-14 flex items-center gap-6 sticky top-0 z-50">
  <span class="font-extrabold text-[1.15rem] tracking-tight">Product Catalogue Management System</span>
  <nav class="flex gap-1"></nav>
  <div class="ml-auto flex items-center gap-2">
    <i class="bi bi-bell text-[#888] text-[1.1rem] cursor-pointer"></i>
    <div class="w-[30px] h-[30px] bg-[#1a1a1a] rounded-full flex items-center justify-center text-white text-[.75rem] font-bold cursor-pointer">JD</div>
  </div>
</header>

<div class="grid grid-cols-[1fr_320px] overflow-hidden" style="height:calc(100vh - 56px)">

  <!-- MAIN -->
  <main class="overflow-y-auto p-5 px-6">
    <!-- Toolbar -->
    <div class="flex items-center gap-2 mb-5">
      <button id="gridBtn" onclick="setView('grid')"
        class="view-btn bg-[#f0f0f0] text-[#1a1a1a] border-none px-2 py-1.5 rounded-md text-base cursor-pointer transition-all">
        <i class="bi bi-grid-3x3-gap-fill"></i>
      </button>
      <span id="gridLabel" class="text-[.75rem] text-[#1a1a1a]">Grid</span>
      <div class="w-px h-[22px] bg-[#e0e0e0] mx-1"></div>
      <button id="listBtn" onclick="setView('list')"
        class="view-btn text-[#888] border-none px-2 py-1.5 rounded-md text-base cursor-pointer transition-all hover:bg-[#f0f0f0] hover:text-[#1a1a1a]">
        <i class="bi bi-list-ul"></i>
      </button>
      <span id="listLabel" class="text-[.75rem] text-[#888]">List</span>
      <button class="ml-auto flex items-center gap-1.5 border border-[#e0e0e0] rounded-md px-3 py-1.5 text-[.8rem] text-[#1a1a1a] bg-transparent cursor-pointer hover:bg-[#f0f0f0] transition-all">
        <i class="bi bi-funnel"></i> A-Z
      </button>
    </div>

    <!-- Product Grid -->
    <div id="productGrid" class="grid grid-cols-4 gap-4">
      <!-- Cards generated by JS -->
    </div>
  </main>

  <!-- SIDEBAR -->
  <aside class="border-l border-[#e0e0e0] bg-white flex flex-col overflow-y-auto">
    <!-- Sidebar Top -->
    <div class="px-[1.1rem] pt-[1.1rem] pb-3 border-b border-[#e0e0e0]">
      <button class="w-full flex items-center justify-center gap-1.5 bg-[#e62b2b] hover:bg-[#c41f1f] text-white font-bold text-[.9rem] px-4 py-2.5 rounded-lg cursor-pointer transition-all hover:shadow-[0_4px_14px_rgba(230,43,43,.3)] border-none">
        <i class="bi bi-plus-lg"></i> Add product
      </button>
      <div class="relative mt-3">
        <input type="text" placeholder="Search products" oninput="filterProducts(this.value)"
          class="w-full border border-[#e0e0e0] rounded-lg py-[.45rem] pr-9 pl-[.85rem] text-[.82rem] text-[#1a1a1a] outline-none bg-[#fafafa] transition-all focus:border-[#e62b2b] focus:bg-white"/>
        <i class="bi bi-arrow-right-circle-fill absolute right-[.7rem] top-1/2 -translate-y-1/2 text-[#e62b2b] text-base pointer-events-none"></i>
      </div>
    </div>

    <!-- Filter Tabs -->
    <div class="flex gap-1.5 px-[1.1rem] py-3 border-b border-[#e0e0e0] flex-wrap">
      <button class="filter-tab active text-[.74rem] font-semibold px-3 py-[.3rem] rounded-full border-[1.5px] bg-[#1a1a1a] text-white border-[#1a1a1a] cursor-pointer transition-all" onclick="setFilter(this,'all')">All</button>
      <button class="filter-tab text-[.74rem] font-semibold px-3 py-[.3rem] rounded-full border-[1.5px] border-[#e0e0e0] bg-transparent text-[#888] cursor-pointer transition-all hover:bg-[#f0f0f0] hover:text-[#1a1a1a]" onclick="setFilter(this,'division')">By division</button>
      <button class="filter-tab text-[.74rem] font-semibold px-3 py-[.3rem] rounded-full border-[1.5px] border-[#e0e0e0] bg-transparent text-[#888] cursor-pointer transition-all hover:bg-[#f0f0f0] hover:text-[#1a1a1a]" onclick="setFilter(this,'company')">By company</button>
      <button class="filter-tab text-[.74rem] font-semibold px-3 py-[.3rem] rounded-full border-[1.5px] border-[#e0e0e0] bg-transparent text-[#888] cursor-pointer transition-all hover:bg-[#f0f0f0] hover:text-[#1a1a1a]" onclick="setFilter(this,'segment')">By segment</button>
    </div>

    <!-- Sidebar Products -->
    <div id="sidebarProducts" class="px-[1.1rem] py-3 flex-1">
      <!-- Generated by JS -->
    </div>
  </aside>

</div>

<script>
const PRODUCTS = [
  { id:1, name:'Carbon Fiber Frame',    meta:'Automotive · Part #CF-001', count:12, color:'#111' },
  { id:2, name:'Titanium Brake Kit',    meta:'Racing · Part #TBK-204',    count:8,  color:'#1a1a1a' },
  { id:3, name:'LED Headlight Array',   meta:'Lighting · Part #LH-550',   count:24, color:'#0d0d0d' },
  { id:4, name:'Suspension Module',     meta:'Chassis · Part #SM-310',    count:5,  color:'#151515' },
  { id:5, name:'Wiring Harness Pro',    meta:'Electrical · Part #WH-88',  count:16, color:'#121212' },
  { id:6, name:'Alloy Wheel Set',       meta:'Wheels · Part #AW-64',      count:9,  color:'#0a0a0a' },
  { id:7, name:'Turbo Intake Manifold', meta:'Engine · Part #TIM-902',    count:3,  color:'#1c1c1c' },
  { id:8, name:'Racing Seat Shell',     meta:'Interior · Part #RS-177',   count:7,  color:'#141414' },
];

let currentView = 'grid';
let allProducts = [...PRODUCTS];

function renderGrid(products) {
  const grid = document.getElementById('productGrid');
  if (currentView === 'grid') {
    grid.innerHTML = products.map(p => `
      <div class="bg-white rounded-[10px] overflow-hidden border border-[#e0e0e0] cursor-pointer transition-all hover:shadow-[0_6px_24px_rgba(0,0,0,.1)] hover:-translate-y-0.5 relative">
        <div class="aspect-square flex items-center justify-center overflow-hidden relative" style="background:${p.color}">
          <i class="bi bi-box text-[#333] text-[2rem]"></i>
          <span class="absolute top-2 right-2 bg-white/15 text-white text-[.65rem] font-bold px-[7px] py-[2px] rounded-[20px] backdrop-blur-sm">#${p.id.toString().padStart(3,'0')}</span>
        </div>
        <div class="px-3 py-2.5">
          <div class="text-[.78rem] font-semibold truncate text-[#1a1a1a]">${p.name}</div>
          <div class="text-[.7rem] text-[#888] mt-[2px]">${p.meta}</div>
        </div>
      </div>
    `).join('');
  } else {
    grid.innerHTML = products.map(p => `
      <div class="bg-white flex flex-row h-[72px] overflow-hidden border border-[#e0e0e0] cursor-pointer transition-all hover:shadow-[0_6px_24px_rgba(0,0,0,.1)] hover:-translate-y-0.5 rounded-[10px] relative">
        <div class="w-[72px] h-[72px] flex items-center justify-center flex-shrink-0" style="background:${p.color}">
          <i class="bi bi-box text-[#333] text-[2rem]"></i>
        </div>
        <div class="px-3 flex flex-col justify-center">
          <div class="text-[.78rem] font-semibold truncate text-[#1a1a1a]">${p.name}</div>
          <div class="text-[.7rem] text-[#888] mt-[2px]">${p.meta}</div>
        </div>
      </div>
    `).join('');
  }
}

function renderSidebar(products) {
  document.getElementById('sidebarProducts').innerHTML = products.map(p => `
    <div class="flex gap-3 items-center mb-[.85rem] cursor-pointer rounded-lg px-[.4rem] py-[.35rem] transition-all hover:bg-[#f5f5f5]">
      <div class="w-[68px] h-[52px] rounded-md overflow-hidden flex-shrink-0 flex items-center justify-center" style="background:${p.color}">
        <i class="bi bi-box text-[#333] text-[.9rem]"></i>
      </div>
      <div class="flex-1 min-w-0">
        <div class="text-[.78rem] font-semibold truncate">${p.name}</div>
        <div class="text-[.68rem] text-[#888] mt-[2px]">${p.meta}</div>
      </div>
      <span class="text-[.7rem] font-bold bg-[#f0f0f0] rounded-[20px] px-2 py-[2px] text-[#888] flex-shrink-0">${p.count}</span>
    </div>
  `).join('');
}

function setView(v) {
  currentView = v;
  const grid = document.getElementById('productGrid');
  const gBtn = document.getElementById('gridBtn');
  const lBtn = document.getElementById('listBtn');
  const gLbl = document.getElementById('gridLabel');
  const lLbl = document.getElementById('listLabel');

  if (v === 'grid') {
    grid.className = 'grid grid-cols-4 gap-4';
    gBtn.className = 'view-btn bg-[#f0f0f0] text-[#1a1a1a] border-none px-2 py-1.5 rounded-md text-base cursor-pointer transition-all';
    lBtn.className = 'view-btn text-[#888] border-none px-2 py-1.5 rounded-md text-base cursor-pointer transition-all hover:bg-[#f0f0f0] hover:text-[#1a1a1a]';
    gLbl.className = 'text-[.75rem] text-[#1a1a1a]';
    lLbl.className = 'text-[.75rem] text-[#888]';
  } else {
    grid.className = 'grid grid-cols-1 gap-4';
    lBtn.className = 'view-btn bg-[#f0f0f0] text-[#1a1a1a] border-none px-2 py-1.5 rounded-md text-base cursor-pointer transition-all';
    gBtn.className = 'view-btn text-[#888] border-none px-2 py-1.5 rounded-md text-base cursor-pointer transition-all hover:bg-[#f0f0f0] hover:text-[#1a1a1a]';
    lLbl.className = 'text-[.75rem] text-[#1a1a1a]';
    gLbl.className = 'text-[.75rem] text-[#888]';
  }
  renderGrid(allProducts);
}

function filterProducts(q) {
  const filtered = PRODUCTS.filter(p =>
    p.name.toLowerCase().includes(q.toLowerCase()) ||
    p.meta.toLowerCase().includes(q.toLowerCase())
  );
  allProducts = filtered;
  renderGrid(filtered);
  renderSidebar(filtered);
}

function setFilter(el, type) {
  document.querySelectorAll('.filter-tab').forEach(t => {
    t.className = 'filter-tab text-[.74rem] font-semibold px-3 py-[.3rem] rounded-full border-[1.5px] border-[#e0e0e0] bg-transparent text-[#888] cursor-pointer transition-all hover:bg-[#f0f0f0] hover:text-[#1a1a1a]';
  });
  el.className = 'filter-tab text-[.74rem] font-semibold px-3 py-[.3rem] rounded-full border-[1.5px] bg-[#1a1a1a] text-white border-[#1a1a1a] cursor-pointer transition-all';
}

// Init
renderGrid(allProducts);
renderSidebar(allProducts);
</script>
</body>
</html>
